name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  Proto:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
      - name: Checkout beerproto
        uses: actions/checkout@v2
        with:
          repository: beerproto/beerproto
          path: proto
      - uses: dart-lang/setup-dart@v1
      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true      
      - name: Buf generate
        run: buf generate beerprotoapis --template=buf.gen.dart.yaml
        working-directory: ./proto
      - name: Move beer file
        run: mv ./proto/gen/beerproto/v1/* ./lib
      # Generated files reference well-known types (e.g. google.protobuf.Timestamp)
      # via '../../google/protobuf/…', which assumes the beerproto/v1/ sub-path.
      # After flattening into lib/ that must resolve as 'google/protobuf/…'
      # (the well-known types are committed under lib/google/protobuf/).
      - name: Fix well-known type imports after flatten
        run: sed -i 's#\.\./\.\./google/protobuf/#google/protobuf/#g' ./lib/*.dart
      - run: rm -R ./proto
      - name: Push
        uses: actions-x/commit@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: "main"
      - name: Capture pushed commit
        id: pushed
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v1.${{ github.run_number }}.0
          commitish: ${{ steps.pushed.outputs.sha }}
          body: CI Release ${{ github.ref }}
          draft: false
          prerelease: false
          release_name: v1.${{ github.run_number }}.0

